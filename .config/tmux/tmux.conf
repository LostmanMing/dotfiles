# Tmux Config — LostmanMing

# --- Basic ---
set -g mouse on                    # 鼠标支持
set -s escape-time 0               # 按键响应更快
set -g focus-events on             # 焦点事件
set -g history-limit 10000         # 回滚行数
set -g base-index 1                # 窗口编号从 1 开始
setw -g pane-base-index 1          # 面板编号从 1 开始
set -g renumber-windows on         # 关闭窗口后重新编号

# --- True Color ---
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm*:Tc"

# --- Pane Navigation (vim-style) ---
bind h select-pane -L               # 左边面板
bind j select-pane -D               # 下面面板
bind k select-pane -U               # 上面面板
bind l select-pane -R               # 右边面板

# --- Splits (对齐 nvim: \ 垂直, - 水平) ---
bind \\ split-window -h -c "#{pane_current_path}"   # 垂直分屏
bind - split-window -v -c "#{pane_current_path}"    # 水平分屏

# --- Window Management ---
bind t new-window -c "#{pane_current_path}"   # 新建窗口（t=terminal）
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# --- Copy Mode (vi 风格) ---
setw -g mode-keys vi

bind Escape copy-mode                  # 进入复制模式
bind Enter copy-mode                   # 进入复制模式

# 退出复制模式
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi a send -X cancel
bind -T copy-mode-vi q send -X cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi Enter send -X cancel

# vim 风格选择
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 粘贴
bind P paste-buffer
bind -T copy-mode-vi p paste-buffer \; send -X cancel

# --- Session ---
bind S command-prompt -p "Session name:" "new-session -s '%%'"   # 新建 session
bind N switch-client -n                 # 下一个 session
bind . command-prompt -I "#S" "rename-session '%%'"   # 重命名 session

# --- Status Bar ---
set -g status on
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 60
set -g status-interval 5

# 配色（AtomOneDark）：蓝 #61afef，背景 #21252b，灰 #abb2bf
set -g status-left "#[bg=#61afef,fg=#21252b,bold] #S "
set -g status-right "#[bg=#3e4451,fg=#abb2bf] %H:%M "
set -g status-style "bg=#21252b,fg=#abb2bf"

setw -g window-status-separator " "
setw -g window-status-format "#[fg=#5c6370]#{window_index} #W"
setw -g window-status-current-format "#[bg=#3e4451,fg=#61afef,bold]#{window_index} #[fg=#abb2bf]#W"

setw -g pane-border-style "fg=#61afef"    # 分隔线统一蓝色
set -g pane-active-border-style "fg=#61afef,bold"   # 活动面板加粗区分

# --- Prefix: Ctrl+z ---
unbind C-b
set -g prefix C-z
bind C-z send-prefix
